<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2300b386'/><rect x='7' y='9' width='18' height='19' rx='2.5' fill='white'/><rect x='11' y='6' width='10' height='6' rx='3' fill='%23e0f7f1'/><rect x='11' y='6' width='10' height='6' rx='3' fill='none' stroke='%2300b386' stroke-width='1.2'/><rect x='13.5' y='7.5' width='5' height='3' rx='1.5' fill='%2300b386'/><rect x='10' y='15' width='12' height='1.8' rx='0.9' fill='%23b2dfdb'/><rect x='10' y='19' width='9' height='1.8' rx='0.9' fill='%23b2dfdb'/><rect x='10' y='23' width='10.5' height='1.8' rx='0.9' fill='%23b2dfdb'/><path d='M10 16 L12.5 18.5 L17 13.5' fill='none' stroke='%2300b386' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<title>Professional Nurse Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toastContainer"></div>

<!-- 병동 선택 모달 -->
<div id="wardSelectOverlay" class="overlay open">
  <div class="ward-select-modal">
    <div style="font-size:36px;margin-bottom:12px">🏥</div>
    <h3>병동 선택</h3>
    <p>근무표를 관리할 병동을 선택해주세요.</p>
    <div class="ward-btn-group" id="wardBtnGroup"></div>
  </div>
</div>

<div class="card">
  <div class="ward-banner" id="wardBanner">
    <div class="ward-dot" id="wardDot"></div>
    <span id="wardBannerText">병동 로딩 중...</span>
    <button class="ward-switch-btn" onclick="openWardSelect()">병동 전환 ↔</button>
  </div>

  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
    <h2 id="currentMonth"></h2>
    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
  </div>
  <div style="overflow-x:auto">
    <table id="schedTable">
      <thead><tr id="dateHeader"></tr></thead>
      <tbody id="schedBody"></tbody>
    </table>
  </div>
  <div class="legend">
    <span>클릭: 근무 변경</span><span style="color:#ccc">│</span>
    <span>우클릭: 초기화</span><span style="color:#ccc">│</span>
    <div class="legend-item"><div class="legend-locked"></div><span>🔒 수동 고정</span></div>
    <span style="color:#ccc">│</span>
    <span style="font-size:9px;font-weight:800;background:#e3f2fd;color:#4facfe;border-radius:4px;padding:1px 5px">H</span><span>Head</span>
    <span style="font-size:9px;font-weight:800;background:#e8f5e9;color:#388e3c;border-radius:4px;padding:1px 5px">C</span><span>Charge</span>
    <span style="font-size:9px;font-weight:800;background:#fff8e1;color:#f9a825;border-radius:4px;padding:1px 5px">A</span><span>Acting</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="generateSchedule()" id="genBtn">근무표 생성</button>
    <button class="btn btn-outline" onclick="toggleModal(true)">인력관리</button>
    <button class="btn btn-outline" onclick="exportToExcel()">엑셀 내보내기</button>
    <button class="btn btn-danger" onclick="resetCurrentMonth()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>초기화
    </button>
    <button class="btn btn-danger" onclick="resetCurrentMonthAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 6l1 14c.1 1.1 1 2 2.1 2h7.8c1.1 0 2-.9 2.1-2l1-14"/></svg>전체 초기화
    </button>
  </div>
</div>

<div class="status-bar">
  <div class="dot loading" id="statusDot"></div>
  <span id="statusText">연결 중...</span>
</div>

<!-- 인력관리 모달 -->
<div id="nurseModal" class="overlay">
  <div class="modal">
    <h3>인력 관리 <span id="nurseModalWardLabel" style="font-size:13px;font-weight:600;color:#adb5bd;margin-left:6px"></span></h3>
    <div id="nurse-list"></div>
    <button class="add-nurse-btn" onclick="addNurseRow()">+ 새로운 인원 추가</button>
    <div class="modal-footer">
      <button class="btn" style="background:#f2f4f6;color:#4e5968" onclick="toggleModal(false)">닫기</button>
      <button class="btn btn-primary" style="flex:2;border-radius:16px" onclick="saveNurses()">설정 저장</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

<div id="globalDropdown" style="display:none;position:fixed;z-index:9999;background:white;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,0.15);border:1px solid #f2f4f6;min-width:160px;max-height:320px;overflow-y:auto"></div>

<div id="confirmOverlay" class="overlay" onclick="if(event.target===this)closeConfirmDialog()">
  <div class="confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <h3 id="confirmTitle"></h3><p id="confirmMessage"></p><p id="confirmSub" style="font-size:12px;color:#adb5bd;margin-top:6px"></p>
    <div class="confirm-btns">
      <button onclick="closeConfirmDialog()">취소</button>
      <button id="confirmOkBtn" class="confirm-ok">초기화</button>
    </div>
  </div>
</div>

<div id="lockOverlay" class="overlay" onclick="if(event.target===this)closeLockDialog()">
  <div class="confirm-modal">
    <div class="confirm-icon">🔒</div>
    <h3>근무를 고정할까요?</h3><p id="lockMessage"></p>
    <p style="font-size:12px;color:#adb5bd;margin-top:6px">고정하면 자동 생성 시 변경되지 않습니다.</p>
    <div class="confirm-btns">
      <button onclick="resolveLock(false)" style="background:#f2f4f6;color:#4e5968">고정 안 함</button>
      <button onclick="resolveLock(true)" class="confirm-ok" style="background:var(--blue)">🔒 고정</button>
    </div>
  </div>
</div>

<div id="alertOverlay" class="overlay" onclick="if(event.target===this)closeAlertDialog()">
  <div class="confirm-modal">
    <div class="confirm-icon">📋</div>
    <h3 id="alertTitle"></h3><p id="alertMessage"></p><p id="alertSub"></p>
    <div class="confirm-btns">
      <button class="confirm-ok" style="background:var(--blue)" onclick="closeAlertDialog()">확인</button>
    </div>
  </div>
</div>
</body>
</html>
